services:
  - type: web
    name: uber-ingreso-egreso-dashboard
    env: python
    plan: free                          # cambia a 'starter' o superior si necesitas más RAM
    region: oregon                      # oregon y frankfurt son las regiones disponibles en free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /
    autoDeploy: true
